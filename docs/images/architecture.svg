<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 820" font-family="-apple-system,BlinkMacSystemFont,'Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafbff"/>
      <stop offset="100%" stop-color="#f0f4ff"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="data" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="im" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="content" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="task" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="ai" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1280" height="820" fill="url(#bg)"/>

  <!-- 标题 -->
  <text x="640" y="55" text-anchor="middle" font-size="32" font-weight="700" fill="#1e293b">lark-fashion-cockpit · 电商航母驾驶舱</text>
  <text x="640" y="85" text-anchor="middle" font-size="14" fill="#64748b">飞书 CLI 创作者大赛 · 45 个 sub-skill · 从「散装能力」到「全员 ChatOps 产品」</text>

  <!-- 用户层 -->
  <rect x="380" y="120" width="520" height="68" rx="34" fill="#ffffff" stroke="#e0e7ff" stroke-width="2" filter="url(#shadow)"/>
  <text x="640" y="148" text-anchor="middle" font-size="15" font-weight="600" fill="#1e293b">👥 老板 + 设计师 + 生产 + 内容 + 客服 + 主播 + …</text>
  <text x="640" y="170" text-anchor="middle" font-size="12" fill="#64748b">打开浏览器跟系统说话</text>

  <!-- 箭头到 omnitask -->
  <path d="M 640 188 L 640 220" stroke="#cbd5e1" stroke-width="2" fill="none" stroke-dasharray="3 3"/>

  <!-- 中央英雄：omnitask-bridge -->
  <rect x="320" y="220" width="640" height="120" rx="14" fill="url(#hero)" filter="url(#shadow)"/>
  <text x="640" y="252" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">🚀 omnitask-bridge — 全员 ChatOps 驾驶舱</text>
  <text x="640" y="278" text-anchor="middle" font-size="13" fill="#e0e7ff">本地 Web 系统（FastAPI 8080）+ 常驻聊天浮窗 + AI 路由编排</text>
  <text x="640" y="300" text-anchor="middle" font-size="12" fill="#c7d2fe">"通知 ZC 工厂" / "今天销售" / "建任务给马萍蔓" / "扫微信群"</text>
  <text x="640" y="320" text-anchor="middle" font-size="11" fill="#a5b4fc">↓ DEEPSEEK 解析意图 + 提取参数 → 路由到具体 skill</text>

  <!-- 5 板块 -->
  <!-- 1. 经营数据 -->
  <g transform="translate(60, 380)">
    <rect width="220" height="180" rx="12" fill="url(#data)" filter="url(#shadow)"/>
    <text x="110" y="36" text-anchor="middle" font-size="17" font-weight="600" fill="#ffffff">📊 经营数据</text>
    <text x="110" y="60" text-anchor="middle" font-size="10" fill="#cffafe">11 个 skill</text>
    <text x="110" y="88" text-anchor="middle" font-size="11" fill="#ffffff">product-library</text>
    <text x="110" y="106" text-anchor="middle" font-size="11" fill="#ffffff">stock-replenishment</text>
    <text x="110" y="124" text-anchor="middle" font-size="11" fill="#ffffff">platform-analytics</text>
    <text x="110" y="142" text-anchor="middle" font-size="11" fill="#ffffff">profit-analysis</text>
    <text x="110" y="160" text-anchor="middle" font-size="11" fill="#ffffff">launch-decision · …</text>
  </g>

  <!-- 2. 跨平台 IM -->
  <g transform="translate(300, 380)">
    <rect width="220" height="180" rx="12" fill="url(#im)" filter="url(#shadow)"/>
    <text x="110" y="36" text-anchor="middle" font-size="17" font-weight="600" fill="#ffffff">📱 跨平台 IM</text>
    <text x="110" y="60" text-anchor="middle" font-size="10" fill="#d1fae5">5 个 skill</text>
    <text x="110" y="88" text-anchor="middle" font-size="11" fill="#ffffff">cross-platform-im-agent</text>
    <text x="110" y="106" text-anchor="middle" font-size="11" fill="#ffffff">wechat-monitor</text>
    <text x="110" y="124" text-anchor="middle" font-size="11" fill="#ffffff">wxauto-supplier-bridge</text>
    <text x="110" y="142" text-anchor="middle" font-size="11" fill="#ffffff">wecom-bridge</text>
    <text x="110" y="160" text-anchor="middle" font-size="11" fill="#ffffff">multi-user-private-channels</text>
  </g>

  <!-- 3. 内容 / 营销 -->
  <g transform="translate(540, 380)">
    <rect width="220" height="180" rx="12" fill="url(#content)" filter="url(#shadow)"/>
    <text x="110" y="36" text-anchor="middle" font-size="17" font-weight="600" fill="#ffffff">🎬 内容营销</text>
    <text x="110" y="60" text-anchor="middle" font-size="10" fill="#fee2e2">7 个 skill</text>
    <text x="110" y="88" text-anchor="middle" font-size="11" fill="#ffffff">blogger-monitor</text>
    <text x="110" y="106" text-anchor="middle" font-size="11" fill="#ffffff">competitor-monitor</text>
    <text x="110" y="124" text-anchor="middle" font-size="11" fill="#ffffff">content-pipeline</text>
    <text x="110" y="142" text-anchor="middle" font-size="11" fill="#ffffff">live-streaming · private-domain</text>
    <text x="110" y="160" text-anchor="middle" font-size="11" fill="#ffffff">video-script-parser · …</text>
  </g>

  <!-- 4. 任务协作 -->
  <g transform="translate(780, 380)">
    <rect width="220" height="180" rx="12" fill="url(#task)" filter="url(#shadow)"/>
    <text x="110" y="36" text-anchor="middle" font-size="17" font-weight="600" fill="#ffffff">🎯 任务协作</text>
    <text x="110" y="60" text-anchor="middle" font-size="10" fill="#fce7f3">12 个 skill</text>
    <text x="110" y="88" text-anchor="middle" font-size="11" fill="#ffffff">task-collaboration</text>
    <text x="110" y="106" text-anchor="middle" font-size="11" fill="#ffffff">approval-flow · okr-cascade</text>
    <text x="110" y="124" text-anchor="middle" font-size="11" fill="#ffffff">morning-report · personal-mirror</text>
    <text x="110" y="142" text-anchor="middle" font-size="11" fill="#ffffff">meeting-workflow · …</text>
    <text x="110" y="160" text-anchor="middle" font-size="11" fill="#ffffff">order-fulfillment · helpdesk-tickets</text>
  </g>

  <!-- 5. AI / 基础设施 -->
  <g transform="translate(1020, 380)">
    <rect width="200" height="180" rx="12" fill="url(#ai)" filter="url(#shadow)"/>
    <text x="100" y="36" text-anchor="middle" font-size="16" font-weight="600" fill="#ffffff">🤖 AI 大脑</text>
    <text x="100" y="60" text-anchor="middle" font-size="10" fill="#ddd6fe">10 个 skill</text>
    <text x="100" y="88" text-anchor="middle" font-size="11" fill="#ffffff">natural-language-router</text>
    <text x="100" y="106" text-anchor="middle" font-size="11" fill="#ffffff">boss-clone-aily</text>
    <text x="100" y="124" text-anchor="middle" font-size="11" fill="#ffffff">skill-recommender</text>
    <text x="100" y="142" text-anchor="middle" font-size="11" fill="#ffffff">auto-scheduler</text>
    <text x="100" y="160" text-anchor="middle" font-size="11" fill="#ffffff">knowledge-base · …</text>
  </g>

  <!-- 连线：omnitask 到 5 板块 -->
  <path d="M 480 340 Q 200 380 170 380" stroke="#cbd5e1" stroke-width="1.5" fill="none"/>
  <path d="M 540 340 Q 410 380 410 380" stroke="#cbd5e1" stroke-width="1.5" fill="none"/>
  <path d="M 640 340 L 640 380" stroke="#cbd5e1" stroke-width="1.5" fill="none"/>
  <path d="M 740 340 Q 870 380 890 380" stroke="#cbd5e1" stroke-width="1.5" fill="none"/>
  <path d="M 800 340 Q 1100 380 1120 380" stroke="#cbd5e1" stroke-width="1.5" fill="none"/>

  <!-- 底层：技术栈 -->
  <rect x="60" y="615" width="1160" height="155" rx="14" fill="#1e293b" filter="url(#shadow)"/>
  <text x="640" y="645" text-anchor="middle" font-size="14" font-weight="600" fill="#94a3b8">数据 + 执行底座</text>

  <!-- 飞书 -->
  <g transform="translate(120, 670)">
    <rect width="280" height="80" rx="8" fill="#0f172a"/>
    <text x="140" y="28" text-anchor="middle" font-size="13" font-weight="600" fill="#60a5fa">📘 飞书多维表格 + CLI</text>
    <text x="140" y="50" text-anchor="middle" font-size="11" fill="#94a3b8">27 张表 · base / im / task / calendar</text>
    <text x="140" y="68" text-anchor="middle" font-size="11" fill="#94a3b8">docs / drive / vc / minutes / approval</text>
  </g>

  <!-- AI 模型 -->
  <g transform="translate(420, 670)">
    <rect width="280" height="80" rx="8" fill="#0f172a"/>
    <text x="140" y="28" text-anchor="middle" font-size="13" font-weight="600" fill="#a78bfa">🧠 AI 模型层</text>
    <text x="140" y="50" text-anchor="middle" font-size="11" fill="#94a3b8">DEEPSEEK V4 Pro/Flash · 路由+总结</text>
    <text x="140" y="68" text-anchor="middle" font-size="11" fill="#94a3b8">DOUBAO 1.5 视觉 · 视频/截图理解</text>
  </g>

  <!-- 外部能力 -->
  <g transform="translate(720, 670)">
    <rect width="280" height="80" rx="8" fill="#0f172a"/>
    <text x="140" y="28" text-anchor="middle" font-size="13" font-weight="600" fill="#34d399">🔌 外部数据源</text>
    <text x="140" y="50" text-anchor="middle" font-size="11" fill="#94a3b8">抖音爬虫 · 小红书 · 视频号</text>
    <text x="140" y="68" text-anchor="middle" font-size="11" fill="#94a3b8">企业微信 API · 个人微信 RPA</text>
  </g>

  <!-- 自动化 -->
  <g transform="translate(1020, 670)">
    <rect width="180" height="80" rx="8" fill="#0f172a"/>
    <text x="90" y="28" text-anchor="middle" font-size="13" font-weight="600" fill="#fbbf24">⏰ 自动化</text>
    <text x="90" y="50" text-anchor="middle" font-size="11" fill="#94a3b8">APScheduler 调度 12 个</text>
    <text x="90" y="68" text-anchor="middle" font-size="11" fill="#94a3b8">cron 任务 + 早 8 点早报</text>
  </g>

  <!-- 底部说明 -->
  <text x="640" y="800" text-anchor="middle" font-size="11" fill="#94a3b8">
    所有 skill 都是 self-contained · npx skills add 一键安装 · 飞书 base 数据为底 · DEEPSEEK 自然语言路由 · 全员可用
  </text>
</svg>
